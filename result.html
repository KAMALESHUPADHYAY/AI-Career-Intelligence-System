<!DOCTYPE html>
<html>
<head>
<title>Resume Result</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

.container{
margin-top:60px;
background:#020617;
width:60%;
margin-left:auto;
margin-right:auto;
padding:40px;
border-radius:20px;
box-shadow:0 0 30px cyan;
}

h1{
color:cyan;
font-size:40px;
}

.score{
font-size:28px;
color:yellow;
margin-top:20px;
}

.box{
margin-top:30px;
padding:20px;
border-radius:15px;
background:#0f172a;
box-shadow:0 0 15px cyan;
}

.skills{
color:lightgreen;
font-size:20px;
}

.missing{
color:red;
font-size:20px;
font-weight:bold;
}

.back{
margin-top:30px;
padding:12px 25px;
background:cyan;
border:none;
font-size:18px;
cursor:pointer;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Resume Analysis Result</h1>

<div class="score">
ATS Score: {{score}} / 100
</div>

<div class="box">
<h2>🎯 Predicted Job Role</h2>
<h2 style="color:cyan;">{{role}}</h2>
</div>

<div class="box">
<h2>✅ Skills Found</h2>
<div class="skills">
{{skills}}
</div>
</div>

<div class="box">
<h2>❌ Missing Skills</h2>
<div class="missing">
{{missing}}
</div>
</div>

<br>
<button class="back" onclick="window.location.href='/'">⬅ Analyze Another Resume</button>

</div>

</body>
</html>
