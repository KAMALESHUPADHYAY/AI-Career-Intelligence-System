<!DOCTYPE html>
<html>
<head>
<title>AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.box{
margin-top:40px;
}

canvas{
background:white;
padding:20px;
border-radius:10px;
}

a{
color:cyan;
font-size:18px;
}
</style>
</head>

<body>

<h1>📊 Resume Analysis Dashboard</h1>

<div class="box">
<h3>Skills Chart</h3>
<canvas id="skillsChart" width="400" height="200"></canvas>
</div>

<div class="box">
<h3>ATS Score Chart</h3>
<canvas id="scoreChart" width="400" height="200"></canvas>
</div>

<br>
<a href="/">⬅ Back to Home</a>

<script>
var ctx = document.getElementById('skillsChart');

new Chart(ctx, {
type: 'bar',
data: {
labels: ['Python','ML','SQL','Java','Communication'],
datasets: [{
label: 'Skill Level',
data: [90,80,60,70,85],
borderWidth: 1
}]
}
});

var ctx2 = document.getElementById('scoreChart');

new Chart(ctx2, {
type: 'doughnut',
data: {
labels: ['ATS Score','Remaining'],
datasets: [{
data: [85,15]
}]
}
});
</script>

</body>
</html>
